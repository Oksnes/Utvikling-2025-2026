<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="registertur.css">
    <script src="registertur.js" defer></script>
</head>
<body>
    <form id="ny-tur-form">
        <h1>Registrer ny tur</h1>
        <label for="brukernavn-dropdown">Brukernavn</label>
        <select id="brukernavn-dropdown" name="brukernavn-dropdown">
            <!--Fylles ut-->
        </select>

        <label for="fjell-dropdown">Fjell:</label>
        <select id="fjell-dropdown" name="fjell-dropdown">
            <!--Fylles ut-->
        </select>

        <label for="tidpunkt">Tidspunkt for turen:</label>
        <input type="date" id="tidspunkt" name="tidspunkt" required>

        <label for="varighet">Varighet (i minutter):</label>
        <input type="number" id="varighet" name="varighet" required>

        <label for="beskrivelse">Beskrivelse:</label>
        <textarea id="beskrivelse" name="beskrivelse" rows="4" required></textarea>

        <button type="submit">Registrer tur</button>

        <a href="personer.html" class="nav-lenke">Se hvor folk har gått</a>
    </form>
</body>
</html>
